.sa6{animation-duration:3.7s;animation-delay:0.2s}
.sa7{animation-duration:2.9s;animation-delay:1.4s}
@keyframes spulse{0%,100%{transform:scaleY(1)}20%{transform:scaleY(1.30)}45%{transform:scaleY(0.80)}70%{transform:scaleY(1.15)}}
@media(prefers-reduced-motion:reduce){.sarm{animation:none}}</style>
<g fill="url(#sg)">
